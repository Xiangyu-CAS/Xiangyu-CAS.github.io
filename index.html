  <body>
    <div id="root"></div>
    <script>
      window.addEventListener("load", function () {
        function forceAvatar() {
          var profile = document.querySelector('[data-loc="client/src/pages/Home.tsx:37"]');
          if (!profile) return;
          var img = profile.querySelector("img");
          if (img) {
            img.src = "/assets/%E7%9C%9F%E4%BA%BA%E5%A4%B4%E5%83%8F.jpg";
            img.alt = "Zhu Xiangyu";
            img.style.objectFit = "cover";
            return;
          }
          var candidates = profile.querySelectorAll("div,span");
          for (var i = 0; i < candidates.length; i++) {
            var el = candidates[i];
            var r = el.getBoundingClientRect();
            if (r.width >= 64 && r.width <= 160 && Math.abs(r.width - r.height) < 8) {
              var ph = document.createElement("img");
              ph.src = "/assets/%E7%9C%9F%E4%BA%BA%E5%A4%B4%E5%83%8F.jpg";
              ph.alt = "Zhu Xiangyu";
              ph.style.width = "100%";
              ph.style.height = "100%";
              ph.style.objectFit = "cover";
              el.textContent = "";
              el.style.overflow = "hidden";
              el.appendChild(ph);
              break;
            }
          }
        }

        function fixProfileIntroAndBadges() {
          var profile = document.querySelector('[data-loc="client/src/pages/Home.tsx:37"]');
          if (!profile) return;

          Array.from(profile.querySelectorAll("div,p,span")).forEach(function (el) {
            var t = (el.textContent || "").replace(/\s+/g, " ").trim();
            if (!t) return;

            if (
              t.indexOf("Bridging the gap between") !== -1 ||
              t.indexOf("wet-lab experiments") !== -1 ||
              t.indexOf("electrophysiology") !== -1 ||
              t.indexOf("neurodevelopmental disorders") !== -1
            ) {
              el.innerHTML = "";
              el.style.display = "none";
            }
          });

          var oldBadges = Array.from(profile.querySelectorAll("span,div")).filter(function (el) {
            var t = (el.textContent || "").replace(/\s+/g, " ").trim();
            if (!t) return false;
            return (
              t === "PhD" ||
              t === "Neuroscience" ||
              t === "Developer" ||
              t === "Master" ||
              t === "Information Engineering"
            );
          });

          var badgeRow = null;
          if (oldBadges.length > 0) {
            badgeRow = oldBadges[0].parentElement;
            oldBadges.forEach(function (el) {
              if (el && el.parentElement) el.remove();
            });
          } else {
            badgeRow = Array.from(profile.querySelectorAll("div")).find(function (el) {
              var cls = String(el.className || "");
              return cls.indexOf("gap-") !== -1 && cls.indexOf("flex") !== -1;
            });
          }

          if (badgeRow && !badgeRow.getAttribute("data-custom-badges")) {
            badgeRow.innerHTML = "";
            badgeRow.setAttribute("data-custom-badges", "1");
            badgeRow.style.display = "flex";
            badgeRow.style.gap = "8px";
            badgeRow.style.flexWrap = "wrap";

            var b1 = document.createElement("span");
            b1.textContent = "Master";
            b1.style.cssText = "display:inline-flex;align-items:center;border-radius:999px;padding:6px 12px;font-size:14px;font-weight:500;background:#f1f5f9;color:#334155;";

            var b2 = document.createElement("span");
            b2.textContent = "Information Engineering";
            b2.style.cssText = "display:inline-flex;align-items:center;border-radius:999px;padding:6px 12px;font-size:14px;font-weight:500;background:#f1f5f9;color:#334155;";

            badgeRow.appendChild(b1);
            badgeRow.appendChild(b2);
          }
        }

        function fixSocialLinks() {
          var profile = document.querySelector('[data-loc="client/src/pages/Home.tsx:37"]');
          if (!profile) return;

          var links = Array.from(profile.querySelectorAll("a[href]"));
          links.forEach(function (a) {
            var href = (a.getAttribute("href") || "").toLowerCase();
            if (href.indexOf("github.com") !== -1) {
              a.setAttribute("href", "https://github.com/Xiangyu-CAS");
              a.setAttribute("target", "_blank");
              a.setAttribute("rel", "noopener noreferrer");
              return;
            }
            if (href.indexOf("twitter.com") !== -1 || href.indexOf("x.com") !== -1) {
              a.setAttribute("href", "https://x.com/Xiangyu14070615");
              a.setAttribute("target", "_blank");
              a.setAttribute("rel", "noopener noreferrer");
              return;
            }
            if (href.indexOf("linkedin.com") !== -1) {
              var wrap = a.closest("button") || a;
              wrap.remove();
            }
          });
        }

        function removeCardByKeywords() {
          var keywords = [
            "Career Trajectory",
            "Latest Publication",
            "Let's Connect",
            "Tech Stack",
            "STEM Expert (Intern)",
            "Email Me",
            "Molecular Psychiatry (2025)"
          ];

          document.querySelectorAll("h1,h2,h3,h4,p,span,div,li").forEach(function (el) {
            var t = (el.textContent || "").trim();
            if (!t) return;
            if (!keywords.some(function (k) { return t === k || t.indexOf(k) !== -1; })) return;

            var card = el;
            for (var i = 0; i < 9 && card; i++) {
              if (card.tagName === "DIV") {
                var cls = card.className ? String(card.className) : "";
                if (
                  cls.indexOf("rounded-") !== -1 ||
                  cls.indexOf("shadow") !== -1 ||
                  cls.indexOf("border") !== -1
                ) {
                  card.style.display = "none";
                }
              }
              card = card.parentElement;
            }
          });
        }

        function applyAll() {
          forceAvatar();
          fixProfileIntroAndBadges();
          fixSocialLinks();
          removeCardByKeywords();
        }

        applyAll();
        setTimeout(applyAll, 250);
        setTimeout(applyAll, 900);
        setTimeout(applyAll, 1800);
        setTimeout(applyAll, 3200);
        setInterval(applyAll, 1000);

        var obs = new MutationObserver(function () {
          applyAll();
        });
        obs.observe(document.body, { childList: true, subtree: true });
      });
    </script>
